<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentViewer — Genera Link di Invito</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1c1c1e;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 6px;
            font-size: 15px;
            color: #6c6c70;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .card h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c6c70;
            margin-bottom: 16px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1c1c1e;
            margin-bottom: 6px;
        }

        label span {
            color: #ff3b30;
            margin-left: 2px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e5ea;
            border-radius: 10px;
            font-size: 15px;
            color: #1c1c1e;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: #007aff;
            background: white;
        }

        input::placeholder { color: #c7c7cc; }

        .hint {
            margin-top: 5px;
            font-size: 12px;
            color: #8e8e93;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: #1c1c1e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 16px;
        }

        .btn-generate:hover { opacity: 0.85; }
        .btn-generate:active { transform: scale(0.98); }

        .result-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: none;
        }

        .result-card.visible { display: block; }

        .result-card h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c6c70;
            margin-bottom: 16px;
        }

        .link-box {
            background: #f2f2f7;
            border-radius: 10px;
            padding: 14px;
            font-size: 13px;
            color: #3a3a3c;
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 14px;
            font-family: 'SF Mono', 'Menlo', monospace;
            border: 1.5px solid #e5e5ea;
        }

        .btn-copy {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-copy:hover { opacity: 0.85; }
        .btn-copy.copied { background: #34c759; }

        .divider {
            height: 1px;
            background: #e5e5ea;
            margin: 20px 0;
        }

        .email-preview {
            background: #f9f9fb;
            border-radius: 10px;
            padding: 16px;
            border: 1.5px solid #e5e5ea;
        }

        .email-preview p {
            font-size: 14px;
            color: #3a3a3c;
            line-height: 1.6;
        }

        .email-preview a {
            color: #007aff;
            text-decoration: underline;
        }

        .email-preview strong {
            color: #1c1c1e;
        }

        .btn-copy-email {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: white;
            color: #007aff;
            border: 1.5px solid #007aff;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy-email:hover {
            background: #007aff;
            color: white;
        }

        .error {
            background: #fff2f2;
            border: 1.5px solid #ffb3b3;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: #ff3b30;
            margin-bottom: 16px;
            display: none;
        }

        .error.visible { display: block; }

        .scheme-tag {
            display: inline-block;
            background: #e8f4ff;
            color: #007aff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="icon">📖</div>
        <h1>ContentViewer</h1>
        <p>Genera il link di invito da inviare via email</p>
    </header>

    <!-- Form -->
    <div class="card">
        <h2>Dati del contenuto</h2>

        <div class="field">
            <label>URL del file ZIP <span>*</span></label>
            <input type="url" id="zipUrl"
                placeholder="https://onedrive.live.com/... oppure https://dropbox.com/...">
            <p class="hint">Incolla il link diretto al file ZIP (OneDrive, Dropbox, Canto, ecc.)</p>
        </div>

        <div class="field">
            <label>Nome del contenuto <span>*</span></label>
            <input type="text" id="name" placeholder="es. Collezione Primavera 2025">
        </div>

        <div class="field">
            <label>Versione</label>
            <input type="text" id="version" placeholder="1.0" value="1.0">
        </div>

        <div class="field">
            <label>URL Thumbnail <span style="color:#8e8e93; font-weight:400">(opzionale)</span></label>
            <input type="url" id="thumbnail"
                placeholder="https://... immagine di copertina">
        </div>

        <div class="field">
            <label>Dimensione file <span style="color:#8e8e93; font-weight:400">(opzionale)</span></label>
            <input type="number" id="fileSize" placeholder="es. 45000000 (in bytes)">
            <p class="hint">In bytes — es. 45 MB = 45000000</p>
        </div>

        <div class="field">
            <label>Il tuo nome <span style="color:#8e8e93; font-weight:400">(opzionale)</span></label>
            <input type="text" id="senderName" placeholder="es. Mario Rossi">
            <p class="hint">Apparirà nell'app come "Condiviso da Mario Rossi"</p>
        </div>
    </div>

    <div class="error" id="errorBox"></div>

    <button class="btn-generate" onclick="generateLink()">
        Genera link di invito
    </button>

    <!-- Risultato -->
    <div class="result-card" id="resultCard">
        <h2>Link generato <span class="scheme-tag">contentviewer://</span></h2>

        <div class="link-box" id="linkBox"></div>

        <button class="btn-copy" id="copyBtn" onclick="copyLink()">
            <span>📋</span>
            <span id="copyLabel">Copia link</span>
        </button>

        <div class="divider"></div>

        <h2>Anteprima email</h2>
        <div class="email-preview" id="emailPreview"></div>
        <button class="btn-copy-email" onclick="copyEmailText()">
            Copia testo email
        </button>
    </div>

</div>

<script>
    let generatedLink = '';
    let contentName = '';

    function generateLink() {
        const zipUrl = document.getElementById('zipUrl').value.trim();
        const name = document.getElementById('name').value.trim();
        const version = document.getElementById('version').value.trim() || '1.0';
        const thumbnail = document.getElementById('thumbnail').value.trim();
        const fileSize = document.getElementById('fileSize').value.trim();
        const senderName = document.getElementById('senderName').value.trim();
        const errorBox = document.getElementById('errorBox');

        // Validazione
        errorBox.classList.remove('visible');

        if (!zipUrl) {
            errorBox.textContent = 'Inserisci l\'URL del file ZIP.';
            errorBox.classList.add('visible');
            return;
        }

        if (!name) {
            errorBox.textContent = 'Inserisci il nome del contenuto.';
            errorBox.classList.add('visible');
            return;
        }

        try { new URL(zipUrl); } catch {
            errorBox.textContent = 'L\'URL del ZIP non è valido.';
            errorBox.classList.add('visible');
            return;
        }

        // Genera ID dal nome
        const id = name.toLowerCase()
            .replace(/\s+/g, '-')
            .replace(/[^a-z0-9-]/g, '')
            .substring(0, 50);

        // Aggiungi &download=1 per OneDrive/SharePoint
        let finalZipUrl = zipUrl;
        if (zipUrl.includes('sharepoint.com') ||
            zipUrl.includes('onedrive.live.com') ||
            zipUrl.includes('1drv.ms')) {
            if (!zipUrl.includes('download=1')) {
                finalZipUrl += zipUrl.includes('?') ? '&download=1' : '?download=1';
            }
        }

        // Costruisce i parametri
        const params = new URLSearchParams();
        params.set('id', id);
        params.set('name', name);
        params.set('version', version);
        params.set('url', finalZipUrl);
        if (thumbnail) params.set('thumbnail', thumbnail);
        if (fileSize) params.set('size', fileSize);
        if (senderName) params.set('from', senderName);

        generatedLink = 'https://marcellotota.github.io/catalogs/redirect.html?' + params.toString();
        contentName = name;

        // Mostra risultato
        document.getElementById('linkBox').textContent = generatedLink;
        document.getElementById('resultCard').classList.add('visible');

        // Anteprima email
        const from = senderName ? `<strong>${senderName}</strong> ti ha condiviso` : 'Hai ricevuto';
        document.getElementById('emailPreview').innerHTML = `
            <p>Ciao,<br><br>
            ${from} il contenuto <strong>"${name}"</strong>.<br><br>
            Clicca il link qui sotto per aprirlo nell'app ContentViewer:<br><br>
            <a href="${generatedLink}">${name} — Apri in ContentViewer</a><br><br>
            <em style="font-size:12px; color:#8e8e93">
                Richiede l'app ContentViewer installata sul dispositivo iOS.
            </em></p>
        `;

        // Scroll al risultato
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }

    function copyLink() {
        navigator.clipboard.writeText(generatedLink).then(() => {
            const btn = document.getElementById('copyBtn');
            const label = document.getElementById('copyLabel');
            btn.classList.add('copied');
            label.textContent = 'Copiato!';
            setTimeout(() => {
                btn.classList.remove('copied');
                label.textContent = 'Copia link';
            }, 2000);
        });
    }

    function copyEmailText() {
        const text = `Ciao,\n\nHai ricevuto il contenuto "${contentName}".\n\nClicca il link qui sotto per aprirlo nell'app ContentViewer:\n\n${generatedLink}\n\nRichiede l'app ContentViewer installata sul dispositivo iOS.`;
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            btn.textContent = '✓ Copiato!';
            setTimeout(() => { btn.textContent = 'Copia testo email'; }, 2000);
        });
    }

    // Genera automaticamente se si preme Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName === 'INPUT') generateLink();
    });
</script>
</body>
</html>
```
